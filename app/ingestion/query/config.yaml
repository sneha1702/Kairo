# Central parameter config for all Dune queries
# Edit values here — run_query.sh substitutes {{param}} placeholders automatically.

# ── Global defaults ────────────────────────────────────────────────────────────
# NOTE: time_window_hours is overridden at runtime by Config.DUNE_QUERY_WINDOW_HOURS
# (set via DUNE_QUERY_WINDOW_HOURS env var or config/dune_params.json, default: 4).
# The value here is only used when the pipeline is invoked outside of Python (e.g. run_query.sh).
globals:
  time_window_hours: 48           # fallback for shell usage; Python pipeline uses Config
  min_usd_value: 100000         # 100000 = $100k threshold, 500000 = $500k
  min_buy_usd: 10000            # minimum single buy size for smart money filter
  spike_multiplier: 2.0         # volume spike = N× the 7-day hourly average
  token_address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"   # default: WETH

# ── Per-query overrides ────────────────────────────────────────────────────────
# Keys here take precedence over both the global default AND Config.DUNE_QUERY_WINDOW_HOURS.
# Only set time_window_hours here when a query genuinely needs a different window.
queries:
  whale_transaction_filter:
    min_usd_value: 100000

  smart_money_accumulation:
    min_buy_usd: 10000
    token_address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"

  bridge_activity:
    min_usd_value: 10000

  wallet_concentration:
    token_address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"

  volume_spike_detection:
    spike_multiplier: 2.0

  new_holder_growth:
    token_address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"

# ── Token reference ────────────────────────────────────────────────────────────
